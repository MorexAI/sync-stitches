<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StitchSync | Sign Up</title>

  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="shared/back-button.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Marcellus&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="auth-nav">
    <a class="auth-logo" href="index.html">STITCH<span>SYNC</span></a>
    <div class="auth-actions">
      <button class="auth-btn" id="theme-toggle" type="button">🌙</button>
      <a class="auth-btn" href="userlogin.html">Log in</a>
    </div>
  </nav>

  <main class="auth-shell">
    <section class="auth-card">
      <h1 class="auth-title great-vibes-regular">Create Your Account</h1>
      <p class="auth-subtitle marcellus-regular">A clean start for a tailored experience.</p>

      <div class="auth-error marcellus-regular" id="auth-error" role="alert"></div>

      <form class="auth-form" id="signup-form">
        <div class="field">
          <label class="marcellus-regular" for="role">Account type</label>
          <select id="role" required>
            <option value="" selected>Select one</option>
            <option value="manufacturer">Manufacturer</option>
            <option value="app">App User</option>
          </select>
        </div>

        <div class="field">
          <label class="marcellus-regular" for="name" id="name-label">Full name</label>
          <input id="name" type="text" autocomplete="name" placeholder="Jane Doe" required>
        </div>

        <div class="field" id="dob-field" hidden>
          <label class="marcellus-regular" for="dob">Date of birth</label>
          <input id="dob" type="date" autocomplete="bday">
        </div>

        <div id="manufacturer-fields" hidden>
          <div class="field">
            <label class="marcellus-regular" for="country">Country</label>
            <select id="country" autocomplete="country-name">
              <option value="" selected>Select country</option>
            </select>
          </div>

          <div class="field">
            <label class="marcellus-regular" for="phone">Phone</label>
            <div class="field-row">
              <select id="phoneCode" aria-label="Phone country code">
                <option value="" selected>Code</option>
              </select>
              <input id="phone" type="tel" autocomplete="tel" placeholder="800 000 0000">
            </div>
          </div>

          <div class="field">
            <label class="marcellus-regular" for="state">State</label>
            <input id="state" type="text" autocomplete="address-level1" placeholder="Start typing..." list="state-list">
            <datalist id="state-list"></datalist>
          </div>

          <div class="field">
            <label class="marcellus-regular" for="city">City</label>
            <input id="city" type="text" autocomplete="address-level2" placeholder="Start typing..." list="city-list">
            <datalist id="city-list"></datalist>
          </div>

          <div class="field">
            <label class="marcellus-regular" for="postalCode">Postal code</label>
            <input id="postalCode" type="text" autocomplete="postal-code" placeholder="100001" list="postal-list">
            <datalist id="postal-list"></datalist>
          </div>
        </div>

        <div class="field">
          <label class="marcellus-regular" for="email">Email</label>
          <input id="email" type="email" autocomplete="email" placeholder="you@domain.com" required>
        </div>

        <div class="field">
          <label class="marcellus-regular" for="password">Password</label>
          <div class="password-wrap">
            <input id="password" type="password" autocomplete="new-password" placeholder="At least 6 characters" required>
            <button class="password-toggle" type="button" data-target="password" aria-label="Show password" aria-pressed="false">👁</button>
          </div>
        </div>

        <div class="field">
          <label class="marcellus-regular" for="confirm">Confirm password</label>
          <div class="password-wrap">
            <input id="confirm" type="password" autocomplete="new-password" placeholder="Repeat password" required>
            <button class="password-toggle" type="button" data-target="confirm" aria-label="Show password" aria-pressed="false">👁</button>
          </div>
        </div>

        <button class="auth-btn auth-btn--primary" type="submit">Create account</button>
      </form>

      <div class="auth-footer marcellus-regular">
        Already have an account? <a class="auth-link" href="userlogin.html">Log in</a>
      </div>
      <div class="auth-note marcellus-regular">
        Manufacturer accounts go to the portal after signup.
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="shared/back-button.js"></script>
</body>
</html>
